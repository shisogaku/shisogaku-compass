<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">
  <defs>
    <!-- メイン背景グラデーション -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff0f8"/>
      <stop offset="100%" stop-color="#f5e6ff"/>
    </radialGradient>
    <!-- コンパス円グラデーション -->
    <radialGradient id="circleGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffe4f5"/>
      <stop offset="50%" stop-color="#f8c8f0"/>
      <stop offset="100%" stop-color="#d9a8e8"/>
    </radialGradient>
    <!-- 外枠グラデーション -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- 針グラデーション（上） -->
    <linearGradient id="needleUp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6eb4"/>
      <stop offset="100%" stop-color="#ff9ed0"/>
    </linearGradient>
    <!-- 針グラデーション（下） -->
    <linearGradient id="needleDown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4a5e8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- ドロップシャドウ -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#d8b4fe" flood-opacity="0.4"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#f9a8d4" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 全体背景 -->
  <rect width="400" height="420" fill="url(#bgGrad)" rx="24"/>

  <!-- 背景のふわふわ装飾円 -->
  <circle cx="60" cy="60" r="40" fill="#fce7f3" opacity="0.5"/>
  <circle cx="340" cy="80" r="30" fill="#ede9fe" opacity="0.5"/>
  <circle cx="50" cy="340" r="35" fill="#f3e8ff" opacity="0.4"/>
  <circle cx="360" cy="320" r="45" fill="#fce7f3" opacity="0.4"/>

  <!-- スパークル装飾 -->
  <!-- 左上 -->
  <g transform="translate(72,55)" opacity="0.8">
    <polygon points="0,-9 2,-2 9,0 2,2 0,9 -2,2 -9,0 -2,-2" fill="#f9a8d4"/>
  </g>
  <!-- 右上 -->
  <g transform="translate(328,72)" opacity="0.8">
    <polygon points="0,-7 1.7,-1.7 7,0 1.7,1.7 0,7 -1.7,1.7 -7,0 -1.7,-1.7" fill="#c084fc"/>
  </g>
  <!-- 右下 -->
  <g transform="translate(345,330)" opacity="0.7">
    <polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2" fill="#f9a8d4"/>
  </g>
  <!-- 左下 -->
  <g transform="translate(58,325)" opacity="0.7">
    <polygon points="0,-6 1.5,-1.5 6,0 1.5,1.5 0,6 -1.5,1.5 -6,0 -1.5,-1.5" fill="#a78bfa"/>
  </g>
  <!-- 小さいスター -->
  <circle cx="100" cy="150" r="3" fill="#f9a8d4" opacity="0.6"/>
  <circle cx="300" cy="140" r="2.5" fill="#c084fc" opacity="0.6"/>
  <circle cx="90" cy="270" r="2" fill="#a78bfa" opacity="0.5"/>
  <circle cx="315" cy="260" r="3" fill="#f9a8d4" opacity="0.6"/>

  <!-- ハート小装飾 (左上あたり) -->
  <g transform="translate(108,88) scale(0.7)" opacity="0.7">
    <path d="M0,-6 C0,-6 -10,-14 -16,-8 C-22,-2 -16,6 0,16 C16,6 22,-2 16,-8 C10,-14 0,-6 0,-6 Z" fill="#fda4af"/>
  </g>
  <!-- ハート小装飾 (右下) -->
  <g transform="translate(295,310) scale(0.6)" opacity="0.7">
    <path d="M0,-6 C0,-6 -10,-14 -16,-8 C-22,-2 -16,6 0,16 C16,6 22,-2 16,-8 C10,-14 0,-6 0,-6 Z" fill="#c084fc"/>
  </g>

  <!-- メインコンパス円（外枠） -->
  <circle cx="200" cy="200" r="148" fill="url(#borderGrad)" filter="url(#shadow)"/>
  <!-- 内側の白リング -->
  <circle cx="200" cy="200" r="140" fill="white" opacity="0.3"/>
  <!-- コンパス本体 -->
  <circle cx="200" cy="200" r="135" fill="url(#circleGrad)"/>

  <!-- コンパスのメモリ（目盛り線） -->
  <g stroke="#e9b8f0" stroke-width="1.5" opacity="0.6">
    <!-- 主要8方向より細かく -->
    <line x1="200" y1="70" x2="200" y2="82"/>   <!-- N -->
    <line x1="200" y1="318" x2="200" y2="330"/>  <!-- S -->
    <line x1="70" y1="200" x2="82" y2="200"/>    <!-- W -->
    <line x1="318" y1="200" x2="330" y2="200"/>  <!-- E -->
    <!-- 斜め -->
    <line x1="108" y1="108" x2="116" y2="116"/>
    <line x1="292" y1="108" x2="284" y2="116"/>
    <line x1="108" y1="292" x2="116" y2="284"/>
    <line x1="292" y1="292" x2="284" y2="284"/>
    <!-- より細かい目盛り -->
    <line x1="155" y1="73" x2="158" y2="85"/>
    <line x1="245" y1="73" x2="242" y2="85"/>
    <line x1="127" y1="88" x2="133" y2="98"/>
    <line x1="273" y1="88" x2="267" y2="98"/>
    <line x1="73" y1="155" x2="85" y2="158"/>
    <line x1="73" y1="245" x2="85" y2="242"/>
    <line x1="88" y1="127" x2="98" y2="133"/>
    <line x1="88" y1="273" x2="98" y2="267"/>
    <line x1="327" y1="155" x2="315" y2="158"/>
    <line x1="327" y1="245" x2="315" y2="242"/>
    <line x1="312" y1="127" x2="302" y2="133"/>
    <line x1="312" y1="273" x2="302" y2="267"/>
    <line x1="155" y1="327" x2="158" y2="315"/>
    <line x1="245" y1="327" x2="242" y2="315"/>
    <line x1="127" y1="312" x2="133" y2="302"/>
    <line x1="273" y1="312" x2="267" y2="302"/>
  </g>

  <!-- コンパスローズ（薄い装飾） -->
  <g opacity="0.15" fill="#c084fc">
    <polygon points="200,80 208,195 200,200 192,195"/>
    <polygon points="200,320 208,205 200,200 192,205"/>
    <polygon points="80,200 195,208 200,200 195,192"/>
    <polygon points="320,200 205,208 200,200 205,192"/>
  </g>

  <!-- 血液型バッジ（4方向） -->
  <!-- 北：A型 -->
  <g filter="url(#softShadow)">
    <circle cx="200" cy="107" r="24" fill="white" opacity="0.95"/>
    <circle cx="200" cy="107" r="24" fill="#ff6eb4" opacity="0.15"/>
    <circle cx="200" cy="107" r="22" fill="none" stroke="#ff9ed0" stroke-width="2"/>
    <text x="200" y="113" text-anchor="middle" font-family="'Hiragino Maru Gothic Pro', 'Comic Sans MS', Arial, sans-serif" font-size="17" font-weight="bold" fill="#e05ba0">A</text>
  </g>
  <!-- 南：B型 -->
  <g filter="url(#softShadow)">
    <circle cx="200" cy="293" r="24" fill="white" opacity="0.95"/>
    <circle cx="200" cy="293" r="24" fill="#a78bfa" opacity="0.15"/>
    <circle cx="200" cy="293" r="22" fill="none" stroke="#c4b5fd" stroke-width="2"/>
    <text x="200" y="299" text-anchor="middle" font-family="'Hiragino Maru Gothic Pro', 'Comic Sans MS', Arial, sans-serif" font-size="17" font-weight="bold" fill="#7c3aed">B</text>
  </g>
  <!-- 東：AB型 -->
  <g filter="url(#softShadow)">
    <circle cx="293" cy="200" r="24" fill="white" opacity="0.95"/>
    <circle cx="293" cy="200" r="24" fill="#fb923c" opacity="0.1"/>
    <circle cx="293" cy="200" r="22" fill="none" stroke="#fdba74" stroke-width="2"/>
    <text x="293" y="205" text-anchor="middle" font-family="'Hiragino Maru Gothic Pro', 'Comic Sans MS', Arial, sans-serif" font-size="12" font-weight="bold" fill="#ea580c">AB</text>
  </g>
  <!-- 西：O型 -->
  <g filter="url(#softShadow)">
    <circle cx="107" cy="200" r="24" fill="white" opacity="0.95"/>
    <circle cx="107" cy="200" r="24" fill="#34d399" opacity="0.1"/>
    <circle cx="107" cy="200" r="22" fill="none" stroke="#6ee7b7" stroke-width="2"/>
    <text x="107" y="205" text-anchor="middle" font-family="'Hiragino Maru Gothic Pro', 'Comic Sans MS', Arial, sans-serif" font-size="17" font-weight="bold" fill="#059669">O</text>
  </g>

  <!-- コンパス針（ハート型） -->
  <!-- 上向き（北）針 -->
  <g filter="url(#glow)">
    <polygon points="200,130 208,195 200,200 192,195" fill="url(#needleUp)"/>
    <!-- ハートチップ -->
    <path d="M200,118 C200,118 188,106 182,112 C176,118 184,128 200,138 C216,128 224,118 218,112 C212,106 200,118 200,118 Z" fill="#ff6eb4"/>
    <path d="M200,118 C200,118 188,106 182,112 C176,118 184,128 200,138 C216,128 224,118 218,112 C212,106 200,118 200,118 Z" fill="white" opacity="0.25"/>
  </g>
  <!-- 下向き（南）針 -->
  <polygon points="200,270 208,205 200,200 192,205" fill="url(#needleDown)"/>

  <!-- 中心ボタン -->
  <circle cx="200" cy="200" r="16" fill="white" opacity="0.9"/>
  <circle cx="200" cy="200" r="13" fill="#f9a8d4"/>
  <circle cx="200" cy="200" r="10" fill="white"/>
  <circle cx="200" cy="200" r="7" fill="#c084fc"/>
  <circle cx="197" cy="197" r="2.5" fill="white" opacity="0.6"/>

  <!-- テキスト エリア -->
  <!-- 支礎学コンパス メインタイトル -->
  <g filter="url(#softShadow)">
    <!-- テキスト背景pill -->
    <rect x="60" y="356" width="280" height="44" rx="22" fill="url(#borderGrad)" opacity="0.9"/>
    <rect x="62" y="358" width="276" height="40" rx="20" fill="white" opacity="0.25"/>
    <text x="200" y="384" text-anchor="middle"
      font-family="'Hiragino Maru Gothic Pro', 'Hiragino Sans', 'Yu Gothic', sans-serif"
      font-size="20" font-weight="bold" fill="white" letter-spacing="2">
      支礎学コンパス
    </text>
  </g>

  <!-- サブタイトル -->
  <text x="200" y="348" text-anchor="middle"
    font-family="'Hiragino Maru Gothic Pro', 'Hiragino Sans', sans-serif"
    font-size="11" fill="#a855f7" opacity="0.9" letter-spacing="1">
    血液型 × 性別 コミュニケーション
  </text>

  <!-- 上部キラキラ（コンパス内） -->
  <g opacity="0.6">
    <polygon points="160,148 162,154 168,156 162,158 160,164 158,158 152,156 158,154" fill="white"/>
    <polygon points="240,160 241.5,165 246,166.5 241.5,168 240,173 238.5,168 234,166.5 238.5,165" fill="white" opacity="0.8"/>
    <circle cx="165" cy="240" r="3" fill="white" opacity="0.7"/>
    <circle cx="238" cy="155" r="2" fill="white" opacity="0.6"/>
  </g>
</svg>
