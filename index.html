const sbDb = {
  // プロフィール一覧取得
  async getProfiles(userId) {
    if (!_sb || !userId) return null;
    const { data, error } = await _sb.from("profiles").select("*").eq("user_id", userId);
    if (error) { console.warn("[SB] getProfiles:", error.message); return null; }
    return data.map(r => ({
      id: r.profile_id, name: r.name, blood: r.blood, gender: r.gender,
      age: r.age, marriage: r.marriage, divorce: r.divorce, kids: r.kids,
      loveExp: r.love_exp, color: r.color,
    }));
  },
  // myId 取得（is_me = true なプロフィールのprofile_id）
  async getMyId(userId) {
    if (!_sb || !userId) return null;
    const { data } = await _sb.from("profiles").select("profile_id")
      .eq("user_id", userId).eq("is_me", true).maybeSingle();
    return data?.profile_id || null;
  },
  // プロフィール保存（upsert）
  async saveProfile(userId, profile, isMe) {
    if (!_sb || !userId) return;
    const { error } = await _sb.from("profiles").upsert({
      user_id: userId, profile_id: profile.id,
      name: profile.name, blood: profile.blood, gender: profile.gender,
      age: profile.age || "", marriage: profile.marriage || "",
      divorce: profile.divorce || "", kids: profile.kids || "",
      love_exp: profile.loveExp || "", color: profile.color || "",
      is_me: !!isMe,
    }, { onConflict: "user_id,profile_id" });
    if (error) console.warn("[SB] saveProfile:", error.message);
  },
  // プロフィール is_me フラグ一括更新
  async updateMyId(userId, myId, profiles) {
    if (!_sb || !userId) return;
    for (const p of profiles) {
      await _sb.from("profiles").update({ is_me: p.id === myId })
        .eq("user_id", userId).eq("profile_id", p.id);
    }
  },
  // プロフィール削除
  async deleteProfile(userId, profileId) {
    if (!_sb || !userId) return;
    await _sb.from("profiles").delete()
      .eq("user_id", userId).eq("profile_id", profileId);

  },
};

                            <span className="font-bold">💡 </span>{focusCompat.tip}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* 最高・最低ペア */}
            {groupPairs.length >= 2 && (()=>{
              const sorted = [...groupPairs].map(([a,b])=>({a,b,c:COMPAT[COMPAT_KEY(a.blood,b.blood)]})).sort((x,y)=>y.c.stars-x.c.stars);
              const best=sorted[0]; const worst=sorted[sorted.length-1];
              return (
                <div className="grid grid-cols-2 gap-2">
                  <div className="p-2 bg-green-50 rounded-lg border border-green-300 text-center">
                    <div className="text-xs font-bold text-green-700 mb-1">🏆 最高相性ペア</div>
                    <div className="text-xs font-bold text-gray-700">{best.a.name}×{best.b.name}</div>
                    <div className="text-yellow-400 text-sm">{"★".repeat(best.c.stars)}</div>
                    <div className="text-xs text-green-600">{best.c.label}</div>
                  </div>
                  <div className="p-2 bg-red-50 rounded-lg border border-red-300 text-center">
                    <div className="text-xs font-bold text-red-700 mb-1">⚡ 要注意ペア</div>
                    <div className="text-xs font-bold text-gray-700">{worst.a.name}×{worst.b.name}</div>
                    <div className="text-yellow-400 text-sm">{"★".repeat(worst.c.stars)}</div>
                    <div className="text-xs text-red-600">{worst.c.label}</div>
                  </div>
                </div>
              );
            })()}
          </>}
        </>}
      </>}
    </div>
  );
}

  return (
    <div className="space-y-4">
      <div className="text-center text-sm font-bold text-gray-700">メッセージ変換ツール</div>

  const startTimer = (b) => { setTimerBlood(b); setTimerSec(COOL[b].sec); setTimerRunning(true); };
  const fmtTime = s => { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60; return h>0?`${h}時間${m}分`:`${m}分${ss}秒`; };
  useState(() => { if(!timerRunning) return; const id=setInterval(()=>setTimerSec(p=>{if(p<=1){setTimerRunning(false);return 0;}return p-1;}),1000); return ()=>clearInterval(id); });

  // XYマップ用データ
  const W=300,H=260,CX=W/2,CY=H/2,R=110;
  const toSvg = (xy) => ({ sx: CX + (xy.x/100)*R, sy: CY - (xy.y/100)*R });

    const bc = BC[p.blood];
    const xy = p.gender==="female" ? bc.xy_f : bc.xy_m;
    const {sx,sy} = toSvg(xy);
    return {...p, sx, sy, color: bc.color};

  const defaultPoints = ["O","A","B","AB"].flatMap(b=>[
    {key:`${b}f`,label:`${b}♀`,sx:toSvg(BC[b].xy_f).sx,sy:toSvg(BC[b].xy_f).sy,color:BC[b].color,dim:true},
    {key:`${b}m`,label:`${b}♂`,sx:toSvg(BC[b].xy_m).sx,sy:toSvg(BC[b].xy_m).sy,color:BC[b].color,dim:true},

  return (
    <div className="w-full space-y-4">

        <div className="text-xs text-gray-400 mb-2">X軸：攻撃性（左）↔ 消極性（右）　Y軸：社会従属性（上）↔ 自己主張性（下）</div>
        <svg width={W} height={H} className="mx-auto block bg-gray-50 rounded-xl border border-gray-200">
          {/* グリッド */}
          <line x1={CX} y1={8} x2={CX} y2={H-8} stroke="#e5e7eb" strokeWidth="1"/>
          <line x1={8} y1={CY} x2={W-8} y2={CY} stroke="#e5e7eb" strokeWidth="1"/>
          {/* 象限ラベル */}
          <text x={18} y={22} fontSize="8" fill="#94a3b8">攻撃的・社会従属</text>
          <text x={W-18} y={22} fontSize="8" fill="#94a3b8" textAnchor="end">消極的・社会従属</text>
          <text x={18} y={H-10} fontSize="8" fill="#94a3b8">攻撃的・自己主張</text>
          <text x={W-18} y={H-10} fontSize="8" fill="#94a3b8" textAnchor="end">消極的・自己主張</text>
          {/* 軸ラベル */}
          <text x={CX} y={14} fontSize="8" fill="#6b7280" textAnchor="middle">社会従属性↑</text>
          <text x={CX} y={H-2} fontSize="8" fill="#6b7280" textAnchor="middle">↓自己主張性</text>
          <text x={12} y={CY+4} fontSize="8" fill="#6b7280">←攻撃性</text>
          <text x={W-10} y={CY+4} fontSize="8" fill="#6b7280" textAnchor="end">消極性→</text>
          {/* デフォルト点（薄い） */}
          {defaultPoints.map(p=>(
            <g key={p.key}>
              <circle cx={p.sx} cy={p.sy} r={5} fill={p.color} opacity={0.18}/>

          ))}
          {/* 登録プロフィール */}
          {plotProfiles.map((p,i)=>(
            <g key={p.id||i}>
              <circle cx={p.sx} cy={p.sy} r={9} fill={p.color} stroke="white" strokeWidth="1.5" opacity={0.9}/>

              <text x={p.sx} y={p.sy+18} fontSize="7" fill={p.color} textAnchor="middle" fontWeight="bold">{p.name}</text>
            </g>
          ))}
          {plotProfiles.length===0&&(
            <text x={CX} y={CY+4} fontSize="10" fill="#d1d5db" textAnchor="middle">プロフィールを登録するとここに表示されます</text>
          )}
        </svg>

      <div>
        <div className="font-bold text-sm text-gray-700 mb-1">⏱️ 怒り冷却タイマー</div>

        <div className="grid grid-cols-4 gap-1 mb-2">
          {["O","A","B","AB"].map(b=>(
            <button key={b} onClick={()=>startTimer(b)}
              className="py-2 rounded-xl text-xs font-bold text-white transition-all"
              style={{backgroundColor: timerBlood===b?"opacity-100":BC[b].color, opacity: timerBlood && timerBlood!==b?0.5:1, backgroundColor:BC[b].color}}>
              {b}型
            </button>
          ))}
        </div>
        {timerBlood && (()=>{
          const total = COOL[timerBlood].sec;
          const progress = total > 0 ? timerSec / total : 0;
          const col = COOL[timerBlood].color;
          const RC = 52, circ = 2*Math.PI*RC;
          const done = timerSec === 0;
          // フェーズ判定
          const phase = done
            ? { emoji:"😊", label:"話しかけてOK！", color:"#22c55e" }
            : progress > 0.7
            ? { emoji:"🔥", label:"まだ冷却中",       color:"#ef4444" }
            : progress > 0.4
            ? { emoji:"😠", label:"少し落ち着いてきた", color:"#f97316" }
            : { emoji:"😐", label:"そろそろ話せる",    color:"#eab308" };
          return (
            <div className="p-4 rounded-2xl border-2 text-center" style={{borderColor:col,backgroundColor:col+"0d"}}>
              <div className="text-xs font-bold mb-2" style={{color:col}}>{COOL[timerBlood].label} — {COOL[timerBlood].desc}</div>
              {/* 円形プログレス */}
              <div className="flex justify-center mb-2">
                <svg width={130} height={130}>
                  {/* 背景円 */}
                  <circle cx={65} cy={65} r={RC} fill="none" stroke="#e5e7eb" strokeWidth={8}/>
                  {/* プログレス円（反時計回りで減っていく） */}
                  {!done && <circle cx={65} cy={65} r={RC} fill="none" stroke={col} strokeWidth={8}
                    strokeDasharray={circ} strokeDashoffset={circ*(1-progress)}
                    strokeLinecap="round" style={{transform:"rotate(-90deg)",transformOrigin:"65px 65px",transition:"stroke-dashoffset 0.5s"}}/>}
                  {done && <circle cx={65} cy={65} r={RC} fill="none" stroke="#22c55e" strokeWidth={8}/>}
                  {/* 中央テキスト */}
                  <text x={65} y={52} textAnchor="middle" fontSize={22} fontWeight="bold" fill={done?"#22c55e":col}
                    fontFamily="monospace">{done?"✅":phase.emoji}</text>
                  <text x={65} y={74} textAnchor="middle" fontSize={11} fontWeight="bold" fill={done?"#22c55e":col}>
                    {done ? "完了！" : fmtTime(timerSec)}
                  </text>
                  <text x={65} y={90} textAnchor="middle" fontSize={9} fill="#9ca3af">
                    {done ? "" : `残 ${Math.round(progress*100)}%`}
                  </text>
                </svg>
              </div>
              {/* フェーズバー */}
              <div className="flex justify-center gap-1 mb-2">
                {[
                  { emoji:"🔥", label:"冷却中", threshold:0.7 },
                  { emoji:"😠", label:"落ち着き", threshold:0.4 },
                  { emoji:"😐", label:"もう少し", threshold:0 },
                  { emoji:"😊", label:"OK！", threshold:-1 },
                ].map((p,i)=>{
                  const active = done ? i===3 : i===0 ? progress>0.7 : i===1 ? (progress>0.4&&progress<=0.7) : i===2 ? (progress>0&&progress<=0.4) : false;
                  return (
                    <div key={i} className={`flex flex-col items-center px-2 py-1 rounded-lg text-xs transition-all ${active?"text-white font-bold":"text-gray-400 bg-gray-100"}`}
                      style={active?{backgroundColor:phase.color}:{}}>
                      <span>{p.emoji}</span>
                      <span style={{fontSize:"9px"}}>{p.label}</span>
                    </div>
                  );
                })}
              </div>
              <div className="text-xs font-bold mb-2" style={{color:phase.color}}>{phase.label}</div>
              <div className="flex gap-2 justify-center">
                <button onClick={()=>setTimerRunning(r=>!r)} disabled={done}
                  className="text-xs px-3 py-1.5 rounded-lg font-bold text-white disabled:opacity-40" style={{backgroundColor:col}}>
                  {timerRunning?"⏸ 停止":"▶ 再開"}
                </button>
                <button onClick={()=>{setTimerBlood(null);setTimerRunning(false);setTimerSec(0);}}
                  className="text-xs px-3 py-1.5 rounded-lg font-bold bg-gray-200 text-gray-600">
                  ✕ リセット
                </button>
              </div>
            </div>
          );
        })()}
      </div>
      <svg width={380} height={220} className="mx-auto">
        <defs><marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#666"/></marker></defs>

function SimulateView({ profiles, myId }) {
  const [simTab, setSimTab] = useState("simulate");
  const [targetId, setTargetId] = useState(null);
  const [inputMsg, setInputMsg] = useState("");
  const [tone, setTone] = useState("普通");
  const [result, setResult] = useState(null);
  const [history, setHistory] = useState([]);

  const me = profiles.find(p => p.id === myId);
  const target = profiles.find(p => p.id === targetId);
  const others = profiles.filter(p => p.id !== myId);

  const simulate = () => {
    if (!target || !inputMsg.trim()) return;
    const targetLabel = `${target.blood}型${target.gender === "female" ? "女性" : "男性"}`;
    const msgType = classifyMsg(inputMsg);
    const reaction = getReaction(targetLabel, msgType, target.relation);
    const improved = improveMsg(inputMsg, targetLabel, msgType, tone);
    const res = { msgType, reaction, improved, targetLabel, tone };
    setResult(res);
    setHistory(prev => [{ ...res, original: inputMsg, targetName: target.name, blood: target.blood, ts: new Date().toLocaleTimeString("ja-JP") }, ...prev.slice(0, 19)]);
  };

  const tendency = (() => {
    if (history.length < 2) return null;
    const byBlood = {};
    history.forEach(h => {
      if (!byBlood[h.blood]) byBlood[h.blood] = { total: 0, count: 0 };
      byBlood[h.blood].total += h.reaction.score;
      byBlood[h.blood].count += 1;
    });
    return Object.entries(byBlood).map(([b, v]) => ({ blood: b, avg: Math.round(v.total / v.count), count: v.count })).sort((a, b) => b.avg - a.avg);
  })();

  const msgFreq = (() => {
    if (history.length < 2) return null;
    const freq = {};
    history.forEach(h => { freq[h.msgType] = (freq[h.msgType] || 0) + 1; });
    return Object.entries(freq).sort((a, b) => b[1] - a[1]);
  })();

  const SIM_TABS = [
    { id: "simulate", label: "シミュ", icon: "🎯" },
    { id: "history",  label: "履歴",  icon: "📝" },
    { id: "tendency", label: "傾向",  icon: "📊" },
  ];

  const ScoreBar = ({ score, label }) => {
    const color = score >= 80 ? "#22c55e" : score >= 55 ? "#eab308" : score >= 30 ? "#f97316" : "#ef4444";
    return (
      <div className="space-y-1">
        <div className="flex justify-between text-xs">
          <span className="text-gray-500">{label}</span>
          <span className="font-bold" style={{color}}>{score}点</span>
        </div>
        <div className="bg-gray-200 rounded-full h-2">
          <div className="h-2 rounded-full transition-all duration-500" style={{width:`${score}%`, backgroundColor:color}}/>
        </div>
      </div>
    );
  };

  if (!me) return (
    <div className="text-center py-12 space-y-2">
      <div className="text-4xl">👤</div>
      <div className="font-bold text-gray-700">「登録」タブで自分を登録してください</div>
    </div>
  );

  if (others.length === 0) return (
    <div className="text-center py-12 space-y-2">
      <div className="text-4xl">👥</div>
      <div className="font-bold text-gray-700">「登録」タブで相手を追加してください</div>
    </div>
  );

  return (
    <div className="space-y-4">
      <div className="text-center">
        <div className="text-sm font-bold text-gray-700">送る前に反応をシミュレート</div>
        <div className="text-xs text-gray-400 mt-0.5">メッセージを入力→相手の反応を体験してから送る</div>
      </div>

      {/* サブタブ */}
      <div className="grid grid-cols-3 gap-0.5 bg-gray-100 rounded-lg p-0.5">
        {SIM_TABS.map(t => (
          <button key={t.id} onClick={() => setSimTab(t.id)}
            className={`py-1.5 rounded text-xs font-bold flex items-center justify-center gap-1 transition-all ${simTab===t.id?"bg-white shadow text-indigo-600":"text-gray-500"}`}>
            <span>{t.icon}</span><span>{t.label}</span>
            {t.id==="history" && history.length > 0 && (
              <span className="bg-indigo-500 text-white rounded-full px-1" style={{fontSize:"9px"}}>{history.length}</span>
            )}
          </button>
        ))}
      </div>

      {/* ── シミュタブ ── */}
      {simTab==="simulate" && (
        <div className="space-y-4">
          <div>
            <div className="text-xs text-gray-500 font-bold mb-1">相手を選ぶ</div>
            <div className="flex flex-wrap gap-1">
              {others.map(p => {
                const bc = BC[p.blood];
                return (
                  <button key={p.id} onClick={() => { setTargetId(p.id); setResult(null); }}
                    className="flex items-center gap-1.5 px-2.5 py-1.5 rounded-xl border-2 text-xs font-bold transition-all"
                    style={targetId===p.id?{backgroundColor:bc.color,borderColor:bc.color,color:"white"}:{borderColor:"#e5e7eb",color:"#374151"}}>
                    <span>{p.name}</span>
                    <span className="opacity-75">{p.blood}型{p.gender==="female"?"♀":"♂"}</span>
                  </button>
                );
              })}
            </div>
          </div>
          <div>
            <div className="text-xs text-gray-500 font-bold mb-1">送りたいメッセージ（そのまま入力）</div>
            <textarea
              className="w-full border-2 border-gray-200 rounded-xl p-3 text-sm resize-none focus:outline-none focus:border-indigo-400 transition-colors"
              rows={3}
              placeholder={"例：あなたとデートしたい\n例：明日の資料お願いできる？\n例：いつも頼りにしてます"}
              value={inputMsg}
              onChange={e => { setInputMsg(e.target.value); setResult(null); }}
            />
          </div>
          <div>
            <div className="text-xs text-gray-500 font-bold mb-1">送り方のトーン</div>
            <div className="grid grid-cols-3 gap-1.5">
              {TONE_OPTIONS.map(t => (
                <button key={t.id} onClick={() => { setTone(t.id); setResult(null); }}
                  className={`flex flex-col items-center gap-0.5 py-2 px-1 rounded-xl border-2 text-xs font-bold transition-all ${tone===t.id?"border-indigo-500 bg-indigo-50 text-indigo-700":"border-gray-200 text-gray-500 bg-white"}`}>
                  <span className="text-base">{t.icon}</span>
                  <span>{t.label}</span>
                  <span className="text-gray-400 font-normal" style={{fontSize:"9px"}}>{t.desc}</span>
                </button>
              ))}
            </div>
          </div>
          <button onClick={simulate} disabled={!targetId||!inputMsg.trim()}
            className={`w-full py-3 rounded-xl font-bold text-sm transition-all ${targetId&&inputMsg.trim()?"bg-indigo-600 text-white hover:bg-indigo-700 shadow-md":"bg-gray-200 text-gray-400"}`}>
            {target?`${target.name}の反応をシミュレート →`:"相手を選んでください"}
          </button>
          {result && target && (
            <div className="space-y-3">
              <div className="flex items-center gap-2 text-xs text-gray-500">
                <span className="bg-gray-100 px-2 py-0.5 rounded-full">分類：<strong>{result.msgType}</strong></span>
                <span className="bg-gray-100 px-2 py-0.5 rounded-full">関係：<strong>{target.relation}</strong></span>
              </div>
              <div className="p-4 rounded-2xl border-2 space-y-3"
                style={{background:result.reaction.score>=70?"#f0fdf4":result.reaction.score>=40?"#fffbeb":"#fef2f2",
                        borderColor:result.reaction.score>=70?"#86efac":result.reaction.score>=40?"#fde68a":"#fca5a5"}}>
                <div className="flex items-center gap-2">
                  <span className="text-2xl">{result.reaction.emoji}</span>
                  <div>
                    <div className="font-bold text-sm text-gray-800">{target.name}の予測反応</div>
                    <div className="text-xs text-gray-500">（{result.targetLabel} / {target.relation}）</div>
                  </div>
                </div>
                <div className="text-sm text-gray-800 font-medium bg-white rounded-lg p-2 border border-gray-200">"{result.reaction.react}"</div>
                <ScoreBar score={result.reaction.score} label="このまま送った場合の効果" />
                {result.reaction.warn && (
                  <div className="flex items-center gap-1.5 p-2 bg-red-50 rounded-lg border border-red-200">
                    <span>⚠️</span><span className="text-xs text-red-700 font-bold">{result.reaction.warn}</span>
                  </div>
                )}
              </div>
              <div className="p-3 bg-blue-50 rounded-xl border border-blue-200">
                <div className="font-bold text-blue-700 text-xs mb-1">💭 なぜそう反応するか（支礎学の理由）</div>
                <div className="text-sm text-blue-800">{result.reaction.why}</div>
              </div>
              <div className="p-4 bg-green-50 rounded-2xl border-2 border-green-300 space-y-3">
                <div className="flex items-center justify-between">
                  <div className="font-bold text-green-700 text-sm">✨ {target.name}に響く改善版</div>
                  <span className="text-xs px-2 py-0.5 rounded-full font-bold"
                    style={{background: result.tone==="フランク"?"#fef9c3":result.tone==="丁寧"?"#ede9fe":"#e0f2fe",
                            color:    result.tone==="フランク"?"#a16207":result.tone==="丁寧"?"#6d28d9":"#0369a1"}}>
                    {TONE_OPTIONS.find(t=>t.id===result.tone)?.icon} {result.tone}
                  </span>
                </div>
                <div className="bg-white rounded-lg p-3 border border-green-200 text-sm text-gray-800 leading-relaxed">{result.improved.converted}</div>
                <ScoreBar score={Math.min(result.reaction.score+35,98)} label="改善版の推定効果" />
                {result.improved.hint && (
                  <div className="text-xs text-green-700 bg-green-100 p-2 rounded-lg">💡 <strong>さらに響かせるコツ：</strong>{result.improved.hint}</div>
                )}
                <button onClick={() => navigator.clipboard?.writeText(result.improved.converted)}
                  className="w-full py-1.5 rounded-lg bg-green-600 text-white text-xs font-bold hover:bg-green-700">
                  📋 改善版をコピー
                </button>
              </div>
              <div className="grid grid-cols-2 gap-2 text-xs">
                <div className="p-2 bg-gray-50 rounded-lg text-center">
                  <div className="text-gray-500">そのまま送ると</div>
                  <div className="font-bold text-lg" style={{color:result.reaction.score>=70?"#22c55e":result.reaction.score>=40?"#eab308":"#ef4444"}}>{result.reaction.score}点</div>
                  <div className="text-gray-400">{result.reaction.score>=70?"良好":result.reaction.score>=40?"注意":"リスクあり"}</div>
                </div>
                <div className="p-2 bg-green-50 rounded-lg text-center border border-green-200">
                  <div className="text-gray-500">改善版なら</div>
                  <div className="font-bold text-lg text-green-600">{Math.min(result.reaction.score+35,98)}点</div>
                  <div className="text-green-500">効果アップ</div>
                </div>
              </div>
              {others.length > 1 && (
                <div>
                  <div className="text-xs font-bold text-gray-500 mb-1">同じメッセージを他の人に送ると…</div>
                  {others.filter(p=>p.id!==target.id).map(p => {
                    const pl=`${p.blood}型${p.gender==="female"?"女性":"男性"}`;
                    const r=getReaction(pl,result.msgType,p.relation);
                    if(!r) return null;
                    return (
                      <div key={p.id} className="flex items-center gap-2 py-1.5 border-b border-gray-100">
                        <div className="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0"
                          style={{backgroundColor:BC[p.blood].color}}>{p.blood}</div>
                        <div className="flex-1">
                          <div className="text-xs font-bold text-gray-700">{p.name}</div>
                          <div className="text-xs text-gray-500">{r.emoji} {r.react.substring(0,25)}…</div>
                        </div>
                        <div className="text-xs font-bold" style={{color:r.score>=70?"#22c55e":r.score>=40?"#eab308":"#ef4444"}}>{r.score}点</div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* ── 履歴タブ ── */}
      {simTab==="history" && (
        <div className="space-y-2">
          {history.length===0 ? (
            <div className="text-center text-gray-400 text-sm py-8">シミュレートすると履歴が記録されます</div>
          ) : (
            <>
              <div className="flex justify-between items-center">
                <div className="text-xs font-bold text-gray-600">過去のシミュレーション（{history.length}件）</div>
                <button onClick={() => setHistory([])} className="text-xs text-red-400 border border-red-200 px-2 py-0.5 rounded">クリア</button>
              </div>
              {history.map((h,i) => (
                <div key={i} className="p-3 rounded-xl border border-gray-200 space-y-1.5"
                  style={{borderLeft:`3px solid ${BC[h.blood]?.color||"#94a3b8"}`}}>
                  <div className="flex justify-between items-start">
                    <div className="flex items-center gap-1.5">
                      <span className="font-bold text-xs" style={{color:BC[h.blood]?.color}}>{h.targetName}</span>
                      <span className="text-xs text-gray-400">{h.msgType}</span>
                    </div>
                    <span className="text-xs text-gray-400">{h.ts}</span>
                  </div>
                  <div className="text-xs text-gray-600 bg-gray-50 rounded p-1.5 italic">"{h.original}"</div>
                  <div className="flex gap-3 text-xs">
                    <span>{h.reaction.emoji} {h.reaction.score}点</span>
                    <span className="text-green-600">→ 改善: {Math.min(h.reaction.score+35,98)}点</span>
                  </div>
                </div>
              ))}
            </>
          )}
        </div>
      )}

      {/* ── 傾向タブ ── */}
      {simTab==="tendency" && (
        <div className="space-y-3">
          {history.length < 2 ? (
            <div className="text-center text-gray-400 text-sm py-8">2件以上シミュレートすると傾向が分析されます</div>
          ) : (
            <>
              <div className="text-xs font-bold text-gray-600 text-center">あなたのコミュニケーション傾向</div>
              <div className="p-3 bg-gray-50 rounded-xl border border-gray-200 space-y-2">
                <div className="text-xs font-bold text-gray-600">血液型別 平均スコア（高い＝伝わりやすい）</div>
                {tendency?.map(({blood,avg,count}) => {
                  const col=avg>=70?"#22c55e":avg>=50?"#eab308":"#ef4444";
                  return (
                    <div key={blood} className="space-y-0.5">
                      <div className="flex justify-between text-xs">
                        <span className="font-bold" style={{color:BC[blood]?.color}}>{blood}型（{count}回）</span>
                        <span className="font-bold" style={{color:col}}>{avg}点</span>
                      </div>
                      <div className="bg-gray-200 rounded-full h-1.5">
                        <div className="h-1.5 rounded-full" style={{width:`${avg}%`,backgroundColor:col}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
              {msgFreq && (
                <div className="p-3 bg-indigo-50 rounded-xl border border-indigo-200 space-y-1.5">
                  <div className="text-xs font-bold text-indigo-700">よく使うメッセージパターン</div>
                  {msgFreq.map(([type,count]) => (
                    <div key={type} className="flex justify-between text-xs">
                      <span className="text-gray-700">{type}</span>
                      <span className="text-gray-500">{count}回</span>
                    </div>
                  ))}
                </div>
              )}
              {tendency && (
                <div className="p-3 bg-yellow-50 rounded-xl border border-yellow-200">
                  <div className="text-xs font-bold text-yellow-700 mb-1">💡 あなたへのアドバイス</div>
                  <div className="text-xs text-gray-700">
                    {tendency[0] && `${tendency[0].blood}型への伝わりやすさが高い（平均${tendency[0].avg}点）。`}
                    {tendency[tendency.length-1]?.avg<50 && ` ${tendency[tendency.length-1].blood}型へのコミュニケーションはさらに工夫が必要かもしれません。`}
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────
// レーダーチャート データ & コンポーネント
// ─────────────────────────────────────────
// ─────────────────────────────────────────
// レベルアップ ノウハウ（弱点軸ごとの改善メソッド）
// ─────────────────────────────────────────

function LevelUpSection({ blood, gender, onChecksChange }) {
  const profileKey = `${blood}${gender === "female" ? "女性" : "男性"}`;
  const storageKey = `shisogaku_levelup_${profileKey}`;

  const [openIdx, setOpenIdx] = useState(null);
  const [checks, setChecks] = useState(() => {
    try { return JSON.parse(localStorage.getItem(storageKey)) || {}; } catch { return {}; }
  });

  useEffect(() => {
    try { localStorage.setItem(storageKey, JSON.stringify(checks)); } catch {}
    if (onChecksChange) onChecksChange(checks);
  }, [checks, storageKey]);

  // 初回マウント時にも親へ通知
  useEffect(() => {
    try {
      const saved = JSON.parse(localStorage.getItem(storageKey)) || {};
      if (onChecksChange) onChecksChange(saved);
    } catch {}
  }, [storageKey]);

  const radarData = RADAR_DATA[profileKey];
  const tipData   = LEVELUP_TIPS[profileKey];
  if (!radarData || !tipData) return null;

  const weakAxes = RADAR_AXES
    .map(ax => ({ ax, v: radarData[ax] }))
    .sort((a, b) => a.v - b.v)
    .filter(({ ax }) => tipData[ax]);

  const getStageIdx = (ax, score) => {
    const stages = LEVEL_STAGES[ax];
    let idx = 0;
    stages.forEach((s, i) => { if (score >= s.min) idx = i; });
    return idx;
  };

  const checkedCount = (ax) =>
    (tipData[ax]?.steps || []).filter((_, si) => checks[`${ax}_${si}`]).length;

  const toggleCheck = (ax, si) => {
    setChecks(prev => ({ ...prev, [`${ax}_${si}`]: !prev[`${ax}_${si}`] }));
  };

  return (
    <div className="border-t border-indigo-200 pt-3 space-y-2">
      <div className="flex items-center gap-1.5 mb-1">
        <span className="text-base">🚀</span>
        <span className="text-xs font-black text-indigo-700">レベルアップ ロードマップ</span>
        <span className="text-xs text-gray-400">アクションをチェックするとレベルが上がります</span>
      </div>
      {weakAxes.map(({ ax, v }, i) => {
        const axColor       = AXIS_COLORS[ax];
        const stages        = LEVEL_STAGES[ax];
        const done          = checkedCount(ax);
        const total         = tipData[ax]?.steps?.length || 0;
        const effectiveScore = Math.min(v + done * 5, 95);
        const baseStageIdx  = getStageIdx(ax, v);
        const effStageIdx   = getStageIdx(ax, effectiveScore); // ← チェックで動く
        const effStage      = stages[effStageIdx];
        const nextStage     = stages[effStageIdx + 1];
        const leveledUp     = effStageIdx > baseStageIdx;
        const isMax         = effStageIdx === stages.length - 1;
        const isOpen        = openIdx === i;

        // 次のステージまであと何チェック必要か
        const checksToNext = nextStage
          ? Math.ceil(Math.max(nextStage.min - effectiveScore, 0) / 5)
          : 0;

        return (
          <div key={ax} className="rounded-xl border-2 overflow-hidden transition-all"
            style={{ borderColor: isOpen ? axColor : leveledUp ? axColor + "80" : "#e5e7eb" }}>

            {/* ヘッダー */}
            <button className="w-full flex items-center gap-2 px-3 py-2.5 text-left"
              style={{ background: isOpen ? axColor + "10" : leveledUp ? axColor + "08" : "white" }}
              onClick={() => setOpenIdx(isOpen ? null : i)}>
              <span className="text-lg flex-shrink-0">{AXIS_ICONS[ax]}</span>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-1.5 flex-wrap">
                  <span className="font-black text-sm text-gray-800">{ax}</span>
                  {/* 現在の有効ステージバッジ（チェックで変わる） */}
                  <span className="text-xs px-1.5 py-0.5 rounded-full font-bold text-white transition-all"
                    style={{ backgroundColor: axColor }}>{effStage.icon} Lv.{effStageIdx+1} {effStage.name}</span>
                  {leveledUp && (
                    <span className="text-xs px-1.5 py-0.5 rounded-full font-black bg-green-100 text-green-700">⬆️ レベルアップ！</span>
                  )}
                </div>
                {/* 進捗バー：ベース(solid) + ボーナス(lighter) */}
                <div className="flex items-center gap-1.5 mt-1">
                  <div className="flex-1 bg-gray-200 rounded-full h-2 relative overflow-hidden">
                    <div className="h-2 rounded-full absolute left-0 transition-all duration-700 opacity-40"
                      style={{ width: `${effectiveScore}%`, backgroundColor: axColor }} />
                    <div className="h-2 rounded-full absolute left-0 transition-all duration-700"
                      style={{ width: `${v}%`, backgroundColor: axColor }} />
                    {/* ステージ境界線 */}
                    {stages.slice(1).map(s => (
                      <div key={s.min} className="absolute top-0 bottom-0 w-px bg-white opacity-60"
                        style={{ left: `${s.min}%` }} />
                    ))}
                  </div>
                  <span className="text-xs font-bold flex-shrink-0" style={{ color: axColor }}>
                    {v}{done > 0 && <span className="text-green-600">+{done*5}</span>}点
                  </span>
                </div>
                {/* 次のレベルまであと何チェック */}
                {!isMax && (
                  <div className="text-xs mt-0.5" style={{ color: checksToNext === 0 ? "#22c55e" : "#9ca3af" }}>
                    {checksToNext === 0
                      ? `✅ Lv.${effStageIdx+2}に到達中！`
                      : `あと${checksToNext}個のアクションで Lv.${effStageIdx+2}「${nextStage.name}」へ`}
                  </div>
                )}
                {isMax && <div className="text-xs mt-0.5 text-yellow-600 font-bold">⭐ 最高レベル達成！</div>}
              </div>
              <span className="text-gray-400 text-xs flex-shrink-0">{isOpen ? "▲" : "▼"}</span>
            </button>

            {isOpen && (
              <div className="px-3 pb-3 space-y-3" style={{ background: axColor + "06" }}>

                {/* ── 4段階ロードマップ ── */}
                <div className="pt-2">
                  <div className="text-xs font-black text-gray-500 mb-2 flex items-center gap-1">
                    <span>📍</span><span>成長ロードマップ</span>
                    {leveledUp && <span className="ml-auto text-green-600 font-black text-xs">⬆️ アクションでレベルアップ中！</span>}
                  </div>
                  <div className="space-y-1">
                    {stages.map((stage, si) => {
                      const isNow    = si === effStageIdx;   // ← チェックで動く NOW
                      const isBase   = si === baseStageIdx && baseStageIdx !== effStageIdx;
                      const isPast   = si < effStageIdx;
                      const isFuture = si > effStageIdx;
                      return (
                        <div key={si} className="flex gap-2 items-start">
                          <div className="flex flex-col items-center flex-shrink-0">
                            <div className="w-8 h-8 rounded-full flex items-center justify-center text-base border-2 font-bold transition-all duration-500"
                              style={
                                isNow
                                  ? { backgroundColor: axColor, borderColor: axColor, color:"white", boxShadow:`0 0 10px ${axColor}80` }
                                  : isPast
                                    ? { backgroundColor: axColor+"25", borderColor: axColor, color: axColor }
                                    : { backgroundColor:"white", borderColor:"#d1d5db", color:"#9ca3af" }

function RadarChart({ blood, gender, color, overrideData }) {
  const key = `${blood}${gender === "female" ? "女性" : "男性"}`;
  const baseData = RADAR_DATA[key];
  const data = overrideData || baseData;
  if (!data) return null;

  const W = 210, H = 190, CX = W / 2, CY = H / 2 + 6, R = 68;
  const N = RADAR_AXES.length;

  const toXY = (i, v) => {
    const angle = -Math.PI / 2 + (2 * Math.PI / N) * i;
    return { x: CX + (v / 100) * R * Math.cos(angle), y: CY + (v / 100) * R * Math.sin(angle) };
  };

  const gridLevels = [25, 50, 75, 100];
  const dataPts = RADAR_AXES.map((ax, i) => { const {x,y}=toXY(i,data[ax]); return `${x},${y}`; }).join(" ");

  const labelPad = 16;
  const labels = RADAR_AXES.map((ax, i) => {
    const angle = -Math.PI / 2 + (2 * Math.PI / N) * i;
    return { ax, val: data[ax], x: CX + (R + labelPad) * Math.cos(angle), y: CY + (R + labelPad) * Math.sin(angle) };
  });

  // 強み・弱みトップ2
  const sorted = [...RADAR_AXES].map(ax => ({ ax, v: data[ax] })).sort((a, b) => b.v - a.v);
  const strengths = sorted.slice(0, 2);
  const weaknesses = sorted.slice(-2).reverse();

  return (
    <div>
      <svg width={W} height={H} style={{ overflow: "visible", display: "block", margin: "0 auto" }}>
        {/* グリッドポリゴン */}
        {gridLevels.map(v => (
          <polygon key={v}
            points={RADAR_AXES.map((_, i) => { const {x,y}=toXY(i,v); return `${x},${y}`; }).join(" ")}
            fill="none" stroke={v === 100 ? "#d1d5db" : "#e5e7eb"} strokeWidth={v === 100 ? 1 : 0.5} />
        ))}
        {/* 軸線 */}
        {RADAR_AXES.map((_, i) => {
          const {x,y} = toXY(i, 100);
          return <line key={i} x1={CX} y1={CY} x2={x} y2={y} stroke="#e5e7eb" strokeWidth={0.8} />;
        })}
        {/* データポリゴン */}
        <polygon points={dataPts} fill={color + "33"} stroke={color} strokeWidth={2} strokeLinejoin="round" />
        {/* 頂点ドット */}
        {RADAR_AXES.map((ax, i) => {
          const {x,y} = toXY(i, data[ax]);
          return <circle key={i} cx={x} cy={y} r={3.5} fill={color} stroke="white" strokeWidth={1} />;
        })}
        {/* ラベル */}
        {labels.map(({ ax, val, x, y }) => (
          <g key={ax}>
            <text x={x} y={y - 5} textAnchor="middle" dominantBaseline="middle" fontSize={8} fill="#6b7280" fontWeight="600">{ax}</text>
            <text x={x} y={y + 5} textAnchor="middle" dominantBaseline="middle" fontSize={9} fill={color} fontWeight="700">{val}</text>
          </g>
        ))}
        {/* 中心点 */}
        <circle cx={CX} cy={CY} r={2} fill={color} opacity={0.5} />
      </svg>
      {/* 強み・弱み */}
      <div className="grid grid-cols-2 gap-2 mt-1">
        <div className="p-2 bg-green-50 rounded-lg border border-green-200">
          <div className="text-xs font-bold text-green-700 mb-1">💪 強み</div>
          {strengths.map(({ ax, v }) => (
            <div key={ax} className="mb-0.5">
              <div className="flex justify-between text-xs">
                <span className="font-bold text-green-800">{ax}</span>
                <span className="text-green-600 font-bold">{v}</span>
              </div>
              <div className="text-xs text-green-700 leading-tight">{RADAR_DESC[ax].high}</div>
            </div>
          ))}
        </div>
        <div className="p-2 bg-orange-50 rounded-lg border border-orange-200">
          <div className="text-xs font-bold text-orange-700 mb-1">⚠️ 弱み</div>
          {weaknesses.map(({ ax, v }) => (
            <div key={ax} className="mb-0.5">
              <div className="flex justify-between text-xs">
                <span className="font-bold text-orange-800">{ax}</span>
                <span className="text-orange-600 font-bold">{v}</span>
              </div>
              <div className="text-xs text-orange-700 leading-tight">{RADAR_DESC[ax].low}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

}

function TorokuView({ profiles, setProfiles, myId, setMyId, user, onLogin }) {
  const [editing, setEditing] = useState(false);
  const [name, setName] = useState("");
  const [blood, setBlood] = useState(null);
  const [gender, setGender] = useState(null);
  const [age, setAge] = useState("");
  const [marriage, setMarriage] = useState("");
  const [kids, setKids] = useState("");
  const [loveExp, setLoveExp] = useState("");
  const [divorce, setDivorce] = useState("");
  const [levelChecks, setLevelChecks] = useState({});

  const me = profiles.find(p => p.id === myId);

  // ── Supabase からレベルチェックを初期ロード ──
  useEffect(() => {
    if (!user || !me) return;
    const pk = `${me.blood}${me.gender === "female" ? "女性" : "男性"}`;
    sbDb.getLevelChecks(user.id, pk).then(sbChecks => {
      if (sbChecks && Object.keys(sbChecks).length > 0) {
        setLevelChecks(sbChecks);
        // localStorageも更新
        localStorage.setItem(`shisogaku_levelup_${pk}`, JSON.stringify(sbChecks));
      }
    });
  }, [user?.id, me?.blood, me?.gender]);

  // ── レベルチェック変化時に Supabase へ同期 ──
  useEffect(() => {
    if (!user || !me || Object.keys(levelChecks).length === 0) return;
    const pk = `${me.blood}${me.gender === "female" ? "女性" : "男性"}`;
    sbDb.saveLevelChecks(user.id, pk, levelChecks);
  }, [levelChecks, user?.id]);

  // チェック状態からレーダーチャートの有効データを計算
  const effectiveRadarData = me ? (() => {
    const pk = `${me.blood}${me.gender === "female" ? "女性" : "男性"}`;
    const tipData = LEVELUP_TIPS[pk];
    const baseData = RADAR_DATA[pk];
    if (!baseData) return null;
    return Object.fromEntries(
      RADAR_AXES.map(ax => {
        const v = baseData[ax];
        const steps = tipData?.[ax]?.steps || [];
        const done = steps.filter((_, si) => levelChecks[`${ax}_${si}`]).length;
        return [ax, Math.min(v + done * 5, 95)];
      })
    );
  })() : null;

  const startEdit = () => {
    if (me) {
      setName(me.name); setBlood(me.blood); setGender(me.gender); setAge(me.age||"");
      setMarriage(me.marriage||""); setKids(me.kids||""); setLoveExp(me.loveExp||""); setDivorce(me.divorce||"");
    } else {
      setName(""); setBlood(null); setGender(null); setAge("");
      setMarriage(""); setKids(""); setLoveExp(""); setDivorce("");
    }
    setEditing(true);
  };

  const save = () => {
    if (!name.trim() || !blood || !gender) return;
    const newP = { id: me?.id || Date.now().toString(), name: name.trim(), blood, gender, age, marriage, kids, loveExp, divorce, relation: "自分", color: BC[blood].color };
    if (me) {
      setProfiles(prev => prev.map(p => p.id === me.id ? newP : p));
    } else {
      setProfiles(prev => [...prev, newP]);
      setMyId(newP.id);
    }
    // Supabase 同期
    if (user) {
      sbDb.saveProfile(user.id, newP, true);
      sbDb.log(user.id, "save_profile", { blood: newP.blood, gender: newP.gender });
    }
    setEditing(false);
  };

  const cancel = () => setEditing(false);

  return (
    <div className="space-y-4">
      <div className="text-center text-sm font-bold text-gray-700">自分のプロフィール</div>
      <div className="text-xs text-gray-500 text-center">まず自分の血液型・性別を登録してください</div>

      {!me && !editing && (
        !user ? (
          /* ── 未ログイン：Googleログインを促す ── */
          <div className="text-center py-10 space-y-4">
            <div className="text-5xl">🔐</div>
            <div className="text-base font-bold text-gray-700">プロフィール登録にはログインが必要です</div>
            <div className="text-xs text-gray-500">Googleアカウントで簡単にログインできます</div>
            <button
              onClick={onLogin}
              className="flex items-center gap-2 mx-auto px-6 py-3 rounded-xl bg-white border-2 border-indigo-300 shadow text-sm font-bold text-indigo-700 hover:bg-indigo-50 transition-all">
              <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
              </svg>
              Googleでログイン・登録
            </button>
            <div className="text-xs text-gray-400 pt-1">登録後、複数端末でデータが同期されます</div>
          </div>
        ) : (
          /* ── ログイン済み：通常の登録ボタン ── */
          <div className="text-center py-8 space-y-3">
            <div className="text-4xl">👤</div>
            <div className="text-sm text-gray-500">まだ登録されていません</div>
            <button onClick={startEdit} className="px-6 py-2 bg-indigo-600 text-white rounded-xl font-bold text-sm hover:bg-indigo-700">
              ＋ 自分を登録する
            </button>
          </div>
        )
      )}

      {editing && (
        <div className="p-3 bg-indigo-50 rounded-xl border border-indigo-200">
          <div className="font-bold text-sm text-indigo-700 mb-3">{me ? "✏️ プロフィールを編集" : "👤 自分を登録"}</div>
          <SelfForm blood={blood} setBl={setBlood} gender={gender} setGe={setGender}
            name={name} setNa={setName} age={age} setAg={setAge}
            marriage={marriage} setMarriage={setMarriage}
            kids={kids} setKids={setKids}
            loveExp={loveExp} setLoveExp={setLoveExp}
            divorce={divorce} setDivorce={setDivorce}
            onSave={save} onCancel={cancel} isEdit={!!me} />
        </div>
      )}

      {me && !editing && (
        <div className="space-y-3">
          {/* 自分カード */}
          <div className="p-4 rounded-xl border-2 border-indigo-400 bg-indigo-50">
            <div className="flex items-center gap-3 mb-3">
              <div className="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold flex-shrink-0"
                style={{ backgroundColor: me.color }}>{me.blood}型</div>
              <div className="flex-1">
                <div className="flex items-center gap-2">
                  <span className="font-black text-lg text-gray-800">{me.name}</span>
                  <span className="text-xs px-2 py-0.5 rounded-full text-white font-bold" style={{ backgroundColor: me.color }}>自分 ★</span>
                </div>
                <div className="text-sm text-gray-600">
                  {me.blood}型 ・ {me.gender === "female" ? "女性" : "男性"}{me.age ? ` ・ ${me.age}` : ""}
                </div>
                {(me.marriage || me.divorce || me.kids || me.loveExp) && (
                  <div className="flex flex-wrap gap-1 mt-1">
                    {me.marriage && <span className="text-xs px-1.5 py-0.5 rounded-full bg-rose-100 text-rose-700 font-bold">💍 結婚{me.marriage}</span>}
                    {me.divorce && me.divorce !== "なし" && <span className="text-xs px-1.5 py-0.5 rounded-full bg-orange-100 text-orange-700 font-bold">離婚{me.divorce}</span>}
                    {me.kids && <span className="text-xs px-1.5 py-0.5 rounded-full bg-green-100 text-green-700 font-bold">👶 子ども{me.kids}</span>}
                    {me.loveExp && <span className="text-xs px-1.5 py-0.5 rounded-full bg-indigo-100 text-indigo-700 font-bold">恋愛経験{me.loveExp}</span>}
                  </div>
                )}
                <RelationshipInsights profile={me} />
              </div>
              <button onClick={startEdit} className="px-3 py-1.5 rounded-lg text-xs border border-gray-300 text-gray-600 bg-white">
                編集
              </button>
            </div>
            {/* レーダーチャート */}
            <div className="border-t border-indigo-200 pt-3">
              <div className="text-xs font-bold text-indigo-600 text-center mb-1">📊 強み・弱み分析</div>
              <RadarChart blood={me.blood} gender={me.gender} color={me.color} overrideData={effectiveRadarData} />
            </div>
            {/* レベルアップ */}
            <LevelUpSection blood={me.blood} gender={me.gender} onChecksChange={setLevelChecks} />
            {/* カード出力 */}
            <div className="border-t border-indigo-200 pt-3">
              <button onClick={()=>{
                const key = `${me.blood}${me.gender==="female"?"女性":"男性"}`;
                const rd = RADAR_DATA[key];
                const bc = BC[me.blood];
                const sorted = RADAR_AXES.map(ax=>({ax,v:rd[ax]})).sort((a,b)=>b.v-a.v);
                const txt = [
                  `【支礎学 プロフィールカード】`,``,
                  `${me.name}（${me.blood}型 ${me.gender==="female"?"女性":"男性"}${me.age?" / "+me.age:""}）`,
                  `タイプ：${bc.type}`,``,
                  `▼ キーワード`,
                  bc.keywords.map(k=>`#${k}`).join("  "),``,
                  `▼ 強み TOP2`,
                  ...sorted.slice(0,2).map(({ax,v})=>`・${ax}（${v}）— ${RADAR_DESC[ax].high}`),``,
                  `▼ 弱み（注意点）`,
                  ...sorted.slice(-2).map(({ax,v})=>`・${ax}（${v}）— ${RADAR_DESC[ax].low}`),``,
                  `▼ 心理ポイント`,
                  ...bc.心理.slice(0,3).map(t=>`・${t}`),``,
                  `─ 支礎学コンパス より ─`,
                ].join("\n");
                navigator.clipboard?.writeText(txt);
              }}
                className="w-full py-2 rounded-xl text-xs font-bold border-2 border-indigo-300 text-indigo-600 bg-indigo-50 hover:bg-indigo-100 transition-all">
                📤 プロフィールカードをコピー（シェア用）
              </button>
            </div>
          </div>
          <div className="text-xs text-gray-400 text-center">相手の登録は「ペア」タブから行えます</div>
        </div>
      )}
    </div>
  );
}

                距離感によって出やすい面が変わります。<strong>表の面</strong>は距離がある時、<strong>裏の面</strong>は距離が近い・信頼関係がある時に出やすい特性です。
              </div>

              <div className="p-2 bg-blue-50 rounded-lg border border-blue-200">
                <div className="font-bold text-blue-700 text-xs mb-1">📏 現在の関係性（{target.relation}）での距離感</div>
                <div className="text-xs text-blue-800">

                    : ["友人"].includes(target.relation)
                    ? "表と裏の中間。仲良くなるにつれ裏の面が出てきます。変化に気づいて受け入れることが大切です。"
                    : "まだ表の面が出やすい距離感です。裏の面を引き出すには信頼の積み重ねが必要です。"}
                </div>
              </div>
            </div>
          )}

          {/* 段階トラッカータブ */}
          {pairTab==="stage" && (

                  <div className="text-xs text-gray-400">女性の心理6段階（支礎学）に基づく関係進捗の確認ツールです</div>
                </div>
              ) : (
                <>
                  <div className="text-xs text-gray-500"><strong>{target.name}</strong>との現在の段階を選択してください</div>
                  <div className="space-y-1.5">
                    {STAGES.map(s => (
                      <button key={s.id} onClick={() => setStageNum(stageNum===s.id?null:s.id)}

                              {stageNum===s.id && <span className="text-xs text-white px-1.5 py-0.5 rounded-full font-bold" style={{backgroundColor:s.color}}>現在</span>}
                            </div>
                            <div className="text-xs text-gray-500 mt-0.5">{s.desc}</div>
                          </div>
                        </div>
                      </button>
                    ))}
                  </div>
                  {stageNum && (() => {
                    const s = STAGES.find(x => x.id===stageNum);
                    const next = STAGES.find(x => x.id===stageNum+1);
                    return (
                      <div className="space-y-2 mt-1">
                        <div className="p-3 bg-green-50 rounded-xl border border-green-200">
                          <div className="font-bold text-green-700 text-xs mb-1">✅ 次の段階へ進むには</div>
                          <div className="text-sm text-green-800">{s.next}</div>
                        </div>
                        <div className="p-3 bg-red-50 rounded-xl border border-red-200">
                          <div className="font-bold text-red-700 text-xs mb-1">⚠️ やってはいけないこと</div>
                          <div className="text-sm text-red-800">{s.avoid}</div>
                        </div>
                        {next ? (
                          <div className="p-2 bg-indigo-50 rounded-lg border border-indigo-200 flex items-center gap-2">
                            <span className="text-base">{next.emoji}</span>
                            <div className="text-xs text-indigo-700"><strong>次の目標：{next.label}</strong> — {next.desc}</div>
                          </div>
                        ) : (
                          <div className="p-2 bg-purple-50 rounded-lg border border-purple-200 text-center">
                            <div className="text-xs text-purple-700 font-bold">💝 最終段階・本母性ライン到達</div>
                            <div className="text-xs text-purple-600 mt-0.5">この関係を大切に維持し続けてください</div>
                          </div>
                        )}
                      </div>
                    );
                  })()}
                </>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// シンプルなメッセージ変換コンポーネント（ペアビュー内用）
function MsgConverter({ tips, targetLabel }) {
  const [input, setInput] = useState("");
  const [result, setResult] = useState("");
  return (
    <div className="space-y-2">
      <textarea
        className="w-full border border-gray-300 rounded-lg p-2 text-sm resize-none focus:outline-none focus:border-indigo-400"
        rows={3}
        placeholder="伝えたい内容を入力..."
        value={input}
        onChange={e => setInput(e.target.value)}
      />
      <button
        onClick={() => setResult(tips.pattern(input.trim()))}
        disabled={!input.trim()}
        className={`w-full py-2 rounded-lg font-bold text-sm ${input.trim()?"bg-indigo-600 text-white":"bg-gray-200 text-gray-400"}`}>
        {targetLabel}向けに変換 →
      </button>
      {result && (
        <div className="p-3 bg-green-50 border border-green-300 rounded-lg text-sm text-green-900 leading-relaxed">{result}</div>
      )}
    </div>
  );
}

      <polygon points="18,18 19.5,22 23,23.5 19.5,25 18,29 16.5,25 13,23.5 16.5,22" fill="#f9a8d4" opacity="0.7"/>
      <polygon points="102,102 103,105 106,106 103,107 102,110 101,107 98,106 101,105" fill="#c084fc" opacity="0.7"/>

}

// ─────────────────────────────────────────
// メイン
// ─────────────────────────────────────────
function CommunicationCompass() {
  const [view,setView] = useState("toroku");
  const [blood,setBlood] = useState(null);
  const [gender,setGender] = useState(null);

  // ── 認証状態 ──
  const [user, setUser] = useState(null);       // Supabase ユーザー
  const [authLoading, setAuthLoading] = useState(!!_sb);

  // ── プロフィール（localStorage + Supabase）──
  const [profiles, setProfiles] = useState(() => {
    try { return JSON.parse(localStorage.getItem("shisogaku_profiles")) || []; } catch { return []; }
  });
  const [myId, setMyId] = useState(() => {
    try { return localStorage.getItem("shisogaku_myId") || null; } catch { return null; }
  });

  // localStorage への永続化
  useEffect(() => { try { localStorage.setItem("shisogaku_profiles", JSON.stringify(profiles)); } catch {} }, [profiles]);
  useEffect(() => { try { if (myId) localStorage.setItem("shisogaku_myId", myId); else localStorage.removeItem("shisogaku_myId"); } catch {} }, [myId]);

  // ── Supabase 認証初期化 ──
  useEffect(() => {
    if (!_sb) return;
    // 現在のセッションを確認
    _sb.auth.getSession().then(({ data: { session } }) => {
      setUser(session?.user ?? null);
      setAuthLoading(false);
      if (session?.user) loadFromSupabase(session.user.id);
    });
    // 認証状態変化を監視
    const { data: { subscription } } = _sb.auth.onAuthStateChange((_event, session) => {
      const u = session?.user ?? null;
      setUser(u);
      setAuthLoading(false);
      if (u) {
        loadFromSupabase(u.id);
        sbDb.log(u.id, "login", { provider: session?.user?.app_metadata?.provider });
      }
    });
    return () => subscription.unsubscribe();
  }, []);

  // Supabase からデータを読み込んで上書き
  const loadFromSupabase = async (userId) => {
    const [sbProfiles, sbMyId] = await Promise.all([
      sbDb.getProfiles(userId),
      sbDb.getMyId(userId),
    ]);
    if (sbProfiles !== null) {
      setProfiles(sbProfiles);
      localStorage.setItem("shisogaku_profiles", JSON.stringify(sbProfiles));
    }
    if (sbMyId !== null) {
      setMyId(sbMyId);
      localStorage.setItem("shisogaku_myId", sbMyId);
    }
  };

  // Google ログイン
  const handleLogin = async () => {
    if (!_sb) return;
    await _sb.auth.signInWithOAuth({
      provider: "google",
      options: { redirectTo: window.location.href }
    });
  };

  // ログアウト
  const handleLogout = async () => {
    if (!_sb) return;
    await _sb.auth.signOut();
    setUser(null);
  };

  // タブ切り替え時にログ記録
  const handleViewChange = (v) => {
    setView(v);
    if (user) sbDb.log(user.id, "view_tab", { tab: v });
  };

  const views = [
    {id:"toroku",label:"登録",icon:"👤"},
    {id:"pair",label:"ペア",icon:"👥"},
    {id:"life",label:"ライフ",icon:"💑"},
    {id:"compat",label:"相性",icon:"💑"},
    {id:"scene",label:"シーン",icon:"🎬"},
    {id:"power",label:"知識",icon:"📚"},
    {id:"simulate",label:"シミュ",icon:"🎯"},
    {id:"plan",label:"プラン",icon:"🏦"},
  ];

  const sbConfigured = SUPABASE_URL !== "YOUR_SUPABASE_URL";

  return (
    <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-purple-50 p-3">
      <div className="max-w-lg mx-auto">
        {/* ヘッダー */}
        <div className="flex items-center justify-between mb-3">
          <div className="flex items-center gap-2.5">
            <LogoIcon size={52} />
            <div>
              <h1 className="text-2xl font-black bg-gradient-to-r from-pink-500 via-purple-500 to-violet-500 bg-clip-text text-transparent leading-tight">支礎学コンパス</h1>
              <p className="text-xs text-gray-500">全25回PDF統合 ｜ 血液型×性別 完全版</p>
            </div>
          </div>
          {/* 認証ボタン */}
          {sbConfigured && (
            authLoading ? (
              <div className="text-xs text-gray-400">読込中…</div>
            ) : user ? (
              <div className="flex items-center gap-1.5">
                <div className="text-right">
                  <div className="text-xs font-bold text-gray-700 max-w-24 truncate">
                    {user.user_metadata?.full_name || user.email}
                  </div>
                  <div className="text-xs text-green-600 font-bold">☁️ 同期中</div>
                </div>
                {user.user_metadata?.avatar_url && (
                  <img src={user.user_metadata.avatar_url} alt="avatar"
                    className="w-8 h-8 rounded-full border-2 border-green-400" />
                )}
                <button onClick={handleLogout}
                  className="text-xs px-2 py-1 rounded-lg bg-gray-100 text-gray-500 border border-gray-200">
                  ログアウト
                </button>
              </div>
            ) : (
              <button onClick={handleLogin}
                className="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-white border-2 border-indigo-200 shadow-sm text-xs font-bold text-indigo-700 hover:bg-indigo-50 transition-all">
                <span>🔑</span> Googleログイン
              </button>
            )
          )}
        </div>
        {/* タブ（2段） */}
        <div className="grid grid-cols-4 gap-0.5 mb-1 bg-white rounded-xl p-1 shadow-sm">
          {views.slice(0,4).map(v=><button key={v.id} onClick={()=>handleViewChange(v.id)} className={`py-1.5 rounded-lg text-xs font-bold transition-all flex flex-col items-center gap-0.5 ${view===v.id?"bg-indigo-600 text-white shadow":"text-gray-500 hover:bg-gray-100"}`}>
            <span>{v.icon}</span><span style={{fontSize:"9px"}}>{v.label}</span>
          </button>)}
        </div>
        <div className="grid grid-cols-4 gap-0.5 mb-3 bg-white rounded-xl p-1 shadow-sm">
          {views.slice(4).map(v=><button key={v.id} onClick={()=>handleViewChange(v.id)} className={`py-1.5 rounded-lg text-xs font-bold transition-all flex flex-col items-center gap-0.5 ${view===v.id?"bg-indigo-600 text-white shadow":"text-gray-500 hover:bg-gray-100"}`}>
            <span>{v.icon}</span><span style={{fontSize:"9px"}}>{v.label}</span>
          </button>)}
        </div>
        {/* カード */}
        <div className="bg-white rounded-2xl shadow-md p-4">
          {view==="toroku"&&<TorokuView profiles={profiles} setProfiles={setProfiles} myId={myId} setMyId={setMyId} user={user} onLogin={handleLogin}/>}
          {view==="pair"&&<PairView profiles={profiles} setProfiles={setProfiles} myId={myId}/>}
          {view==="life"&&<LifeView/>}
          {view==="compat"&&<CompatView profiles={profiles} myId={myId}/>}
          {view==="scene"&&<SceneView profiles={profiles} myId={myId}/>}
          {view==="power"&&<PowerView profiles={profiles}/>}
          {view==="simulate"&&<SimulateView profiles={profiles} myId={myId}/>}
          {view==="plan"&&<PlanView/>}
        </div>
        <div className="text-center text-xs text-gray-400 mt-3">
          支礎学システム ｜ 第1〜25回 + 全会話データ統合版
          {user && <span className="text-green-500 ml-2">☁️ Supabase 同期中</span>}
        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(CommunicationCompass));
  </script>
</body>
</html>
