<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#fdf9f3" />

  <!-- ===== セキュリティ系メタタグ（GitHub Pages はヘッダー返せないので meta で指定）===== -->
  <!-- XSS の影響を最小化する Content Security Policy。
       AdSense と Supabase（API + Auth + Edge Functions）を許可。 -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    base-uri 'self';
    object-src 'none';
    frame-ancestors 'self';
    img-src 'self' data: blob: https://*.supabase.co https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://www.google.com https://www.gstatic.com;
    font-src 'self' data: https://fonts.gstatic.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://www.googletagservices.com https://tpc.googlesyndication.com;
    connect-src 'self' https://*.supabase.co wss://*.supabase.co https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net;
    frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com https://www.google.com;
    form-action 'self';
    upgrade-insecure-requests;
  " />
  <!-- Referrer は same-origin のみフルパス、それ以外はオリジンだけ送る -->
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <!-- MIME スニッフィング無効化（GitHub Pages はヘッダーで送れないので meta で代替） -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <!-- 不要なブラウザ機能をデフォルト無効化 -->
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=()" />

  <title>支礎学コンパス｜血液型で見つける、自分と相手との関わりかた</title>
